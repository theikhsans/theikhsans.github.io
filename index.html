<!doctype html>
<html lang="ms">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Penjana Pola Jahitan</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- Top Navigation -->
      <nav class="top-nav">
        <h1 class="app-title">Pemapar Pola Jahitan</h1>
        <!-- View Toggle -->
        <section class="panel-section">
          <div class="view-selector">
            <button class="view-btn active" data-view="sewingPattern">
              Pola Jahitan
            </button>
            <button class="view-btn" data-view="cuttingLayout">
              Susun Atur Pola
            </button>
          </div>
        </section>
      </nav>

      <!-- Main Layout -->
      <div class="main-content">
        <!-- Left Side Panel -->
        <aside class="side-panel">
          <!-- Garment Selection -->
          <section class="panel-section">
            <h2 class="section-title">Pola</h2>
            <div class="garment-selector">
              <select id="garmentSelect" class="garment-select">
                <option value="bajuKurung">Baju Kurung</option>
                <option value="kain">Kain Susun Tepi</option>
                <option value="leherKurung">Leher Baju Kurung</option>
                <option value="bajuMelayu">Baju Melayu</option>
                <option value="seluar">Seluar</option>
                <option value="leherMelayu">Leher Baju Melayu</option>
              </select>
            </div>
          </section>

          <!-- Size Selection -->
          <section class="panel-section">
            <h2 class="section-title">Saiz</h2>
            <div class="size-selector">
              <select id="sizeSelect" class="size-select">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="4">4</option>
                <option value="6">6</option>
                <option value="8">8</option>
                <option value="10">10</option>
                <option value="XS">XS</option>
                <option value="S">S</option>
                <option value="M" selected>M</option>
                <option value="L">L</option>
                <option value="XL">XL</option>
                <option value="XXL">XXL</option>
              </select>
            </div>
          </section>

          <!-- Measurements -->
          <section class="panel-section">
            <div class="width-toggle" style="display: none">
              <h2 class="section-title">Bidang Kain</h2>
              <div style="gap: 8px; display: flex; flex-direction: row-reverse">
                <button class="width-btn" data-width="60">60</button>
                <button class="width-btn active" data-width="45">45</button>
              </div>
            </div>
            <div class="leher-radio" id="leherRadio" style="display: none">
              <h2 class="section-title">Jenis Leher</h2>
              <input type="radio" id="teluk" name="jenis_leher" value="teluk" />
              <label for="teluk">Teluk Belanga</label><br />

              <input
                type="radio"
                id="cekak"
                name="jenis_leher"
                value="cekak"
                checked
              />
              <label for="cekak">Cekak Musang</label><br />

              <input type="radio" id="tunku" name="jenis_leher" value="tunku" />
              <label for="tunku">Tunku</label>
            </div>
            <h2 class="section-title">Ukuran</h2>
            <div
              class="unit-toggle"
              style="
                padding-bottom: 25px;
                display: flex;
                flex-direction: row-reverse;
              "
            >
              <button class="unit-btn active" data-unit="inci">inci</button>
              <button class="unit-btn" data-unit="cm">cm</button>
            </div>
            <div class="measurements-grid" id="measurementContainer">
              <!-- Populated by JavaScript -->
            </div>
            <div
              id="errorMessage"
              class="error-message"
              style="display: none"
            ></div>
          </section>
        </aside>

        <!-- Canvas Area -->
        <main class="canvas-area">
          <div class="svg-container" id="svgContainer">
            <!-- SVG rendered here -->
          </div>
        </main>
      </div>
    </div>

    <!-- Scripts -->
    <script src="js/measurements.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/state.js"></script>
    <script src="js/svg-builder.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
