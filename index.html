  <body class="gjs-t-body body-root"><header class="header">
    <div class="header-container">
      <div class="header-content">
        <h1 class="gjs-t-h1 header-title">Pola The Ikhsans</h1>
        <p class="header-subtitle">
          <div>Pola mengikut ukuran anda. Jelas, tepat dan direka khas untuk anda.</div>
        </p>
      </div>
      <div class="header-actions">
        <div></div>
      </div>
    </div>
    <div class="gjs-t-border divider-header"></div>
  </header>
  <main class="main-content">
    <section id="measurements" class="section-measurements">
      <section id="pattern-size-selector" aria-labelledby="pss-title" class="gjs-t-border pss-card">
        <div class="pss-head">
          <h2 id="pss-title" class="gjs-t-h2 pss-title">Pola dan Saiz</h2>
        </div>
        <div class="pss-grid">
          <div class="pss-field">
            <label for="garmentSelect" class="pss-label">Pola</label>
            <div class="pss-inputwrap">
              <img src="https://api.iconify.design/lucide-shirt.svg?color=%232f3e46&amp;width=18&amp;height=18" alt="" aria-hidden="true" class="pss-icon"/>
              <select type="text" id="garmentSelect" aria-label="Select pattern type" aria-describedby="pss-helper-text" class="pss-select">
                <option value="bajuKurung">Baju Kurung</option>
                <option value="kain">Kain Susun Tepi</option>
                <option value="leherKurung">Leher Baju Kurung</option>
                <option value="bajuMelayu">Baju Melayu</option>
                <option value="seluar">Seluar</option>
                <option value="leherMelayu">Leher Baju Melayu</option>
              </select>
            </div>
          </div>
          <div class="pss-field">
            <label for="sizeSelect" class="pss-label">Saiz</label>
            <div class="pss-inputwrap">
              <img src="https://api.iconify.design/lucide-ruler.svg?color=%232f3e46&amp;width=18&amp;height=18" alt="" aria-hidden="true" class="pss-icon"/>
              <select type="text" id="sizeSelect" aria-label="Select standard size" aria-describedby="pss-helper-text" class="pss-select">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="4">4</option>
                <option value="6">6</option>
                <option value="8">8</option>
                <option value="10">10</option>
                <option value="XS">XS</option>
                <option value="S">S</option>
                <option value="M" selected>M</option>
                <option value="L">L</option>
                <option value="XL">XL</option>
                <option value="XXL">XXL</option>
              </select>
            </div>
          </div>
        </div>
        <div class="pss-field" id="leherRadio" style="display: block; padding-top: 15px;">
              <label for="pss-pattern" class="pss-label" id="irckkw">Jenis Leher</label>
              <div data-type-role="flex-row" class="gjs-plg-flex-row" id="i1450j">
                <div data-type-role="flex-column" class="gjs-plg-flex-column" id="i3b9sa">
                <input type="radio" id="teluk" name="jenis_leher" value="teluk" checked />
                <label for="teluk">Teluk Belanga</label>
                <br />
                <input type="radio" id="cekak" name="jenis_leher" value="cekak" />
                <label for="cekak">Cekak Musang</label>
                <br />
                <input type="radio" id="tunku" name="jenis_leher" value="tunku" />
                <label for="tunku">Tunku/Mandarin</label>
              </div>
            </div>
        </div>
        <div id="bidang" class="pss-field">
          <span class="width-indicator">
            <div class="width-toggle" style="padding-top: 15px;">
              <label class="pss-label">Bidang</label>
              <div class="toggle-group">
                <button type="button" id="widthToggle45" aria-pressed="true" aria-label="Bidang 45" class="toggle-btn" data-width="45">45</button>
                <button type="button" id="widthToggle60" aria-pressed="false" aria-label="Bidang 60" class="toggle-btn" data-width="60">60</button>             
              </div>
            </div>
          </span>
        </div>
      </section>
      <div id="pattern" class="gjs-t-border card-canvas">
        <div class="canvas-header">
          <div aria-label="Canvas view toggle" role="group" class="toggle-group view-toggle">
            <button type="button" id="viewTogglePattern" aria-pressed="true" aria-label="Show Sewing Pattern" class="toggle-btn" data-view="sewingPattern">Pola Jahitan</button>
            <button type="button" id="viewToggleLayout" aria-pressed="false" aria-label="Show Cutting Layout" class="toggle-btn" data-view="cuttingLayout">Susun Atur Pola</button>
          </div>
        </div>
        <!-- Canvas Area -->
          <div class="svg-container" id="svgContainer" style="padding-top: 15px;">
            <!-- SVG rendered here -->
          </div>
      </div>
      <div class="gjs-t-border card-measurements" >
        <div class="card-header">
          <h2 class="gjs-t-h2 card-title">Ukuran</h2>
          <span class="unit-indicator">
            <img src="https://api.iconify.design/lucide-ruler.svg?color=%236c757d" alt="" loading="eager" class="icon-ruler"/>
            <span>Unit:</span>
            <div class="toggle-group unit-toggle">
              <button type="button" id="unitToggleCm" aria-pressed="false" aria-label="Use centimeters" class="toggle-btn" data-unit="cm">cm</button>
              <button type="button" id="unitToggleIn" aria-pressed="true" aria-label="Use inches" class="toggle-btn" data-unit="inci">inci</button>
            </div>
          </span>
        </div>
        <form method="get" id="measureForm" novalidate="" class="form-measurements">
          <div class="fields-grid" id="measurementContainer">
            <!-- Populated by JavaScript -->
          </div>
        </form>
        <div id="errorMessage" class="error-message" style="display: none"></div>
      </div>
    </section>
  </main>
